          serviceClass: BESTEFFORT
          otherService:
            appName: bookinfo-swmapp
            serviceName: ratings
            port: 9080
    - podspec:
        schedulerName: {{ .schedulerName }}
        containers:
          - name: reviews-v4
            image: docker.io/istio/examples-bookinfo-reviews-v1:1.20.3
            ports:
              - containerPort: 9080
                protocol: TCP
      serviceName: reviews-v4
      serviceChannels:
        - advancedChannelSettings:
            maxDelay: "10s"
          channelName: reviews4torate
          serviceClass: BESTEFFORT
          otherService:
            appName: bookinfo-swmapp
            serviceName: ratings
            port: 9080
    - podspec:
        schedulerName: {{ .schedulerName }}
        containers:
          - name: reviews-v5
            image: docker.io/istio/examples-bookinfo-reviews-v1:1.20.3
            ports:
              - containerPort: 9080
                protocol: TCP
      serviceName: reviews-v5
      serviceChannels:
        - advancedChannelSettings:
            maxDelay: "10s"
          channelName: reviews5torate
          serviceClass: BESTEFFORT
          otherService:
            appName: bookinfo-swmapp
            serviceName: ratings
