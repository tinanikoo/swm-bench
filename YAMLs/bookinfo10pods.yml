        - advancedChannelSettings:
            maxDelay: "10s"
          channelName: reviews6torate
          serviceClass: BESTEFFORT
          otherService:
            appName: bookinfo-swmapp
            serviceName: ratings
            port: 9080
    - podspec:
        schedulerName: {{ .schedulerName }}
        containers:
          - name: reviews-v7
            image: docker.io/istio/examples-bookinfo-reviews-v1:1.20.3
            ports:
              - containerPort: 9080
                protocol: TCP
      serviceName: reviews-v7
      serviceChannels:
        - advancedChannelSettings:
            maxDelay: "10s"
          channelName: reviews7torate
